name: MLOps Train Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'params.yaml'
      - 'dvc.yaml'
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout codigo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Instalar dependencias
      run: pip install -r requirements.txt

    - name: Tests unitarios
      run: pytest tests/ -v --tb=short

    - name: Ejecutar pipeline completo
      run: |
        python src/data/ingest.py
        python src/features/build.py
        python src/models/train.py
        python src/models/evaluate.py

    - name: Verificar metricas
      run: |
        python -c "
        import json
        with open('metrics/evaluation.json') as f:
            m = json.load(f)
        print('RMSE:', m['rmse'])
        print('R2:', m['r2'])
        assert m['promoted'], 'Modelo no paso el umbral'
        print('Modelo listo para deploy')
        "

    - name: Trigger deploy
      if: success()
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.actions.createWorkflowDispatch({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'deploy.yml',
            ref: 'main'
          })